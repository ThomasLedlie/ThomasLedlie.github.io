<!DOCTYPE html>
<html>
  <head>
    <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }[class^="child"] {
      padding: 10px;
    }.child-1 {
      background-color: #F2A74B;
    }.child-2 {
      background-color: #F2C84B;
    }.child-3 {
      background-color: #54ACBF;
    }.child-4 {
      background-color: #3B668C;
    }.child-5 {
      background-color: #8C1127;
    }.child-6 {
      background-color: #F2A74B;
    }
    </style>
  </head>
  
  <body>
    <div class="parent">
      <div class="child-1">1</div>
      <div class="child-2">2</div>
      <div class="child-3">3</div>
      <div class="child-4">4</div>
      <div class="child-5">5</div>
      <div class="child-6">6</div>
    </div>
  </body>
</html>
